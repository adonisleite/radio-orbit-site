<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Radio FM Orbit - O melhor aplicativo para ouvir suas rádios favoritas ao vivo, sem travamentos e com design moderno. Baixe grátis na Google Play.">
    <meta name="keywords" content="rádio, fm, online, orbit, ao vivo, música, streaming, app de rádio, android">
    <meta name="author" content="Adonis Leite">
    <title>Radio FM Orbit - Sua Rádio ao Vivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; /* Azul escuro profundo */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6; /* Azul botão */
            --accent-hover: #2563eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(circle at top, #1e293b 0%, transparent 50%);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .playstore-button {
            display: inline-flex;
            align-items: center;
            background-color: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .playstore-button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -3px rgba(59, 130, 246, 0.4);
        }

        .playstore-button svg {
            margin-right: 10px;
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #1e293b;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-links {
            margin-top: 1rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--text-main);
        }

        @media (max-width: 600px) {
            .hero-title { font-size: 2.5rem; }
            .hero-subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <main>
        <h1 class="hero-title">Radio FM Orbit</h1>
        <p class="hero-subtitle">
            Sintonize nas suas estações favoritas de qualquer lugar. Sem complicação, 100% gratuito e com a melhor qualidade de áudio para o seu dia a dia.
        </p>
        
        <a href="https://play.google.com/store/apps/details?id=com.radiofmorbit.app" class="playstore-button" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24">
                <path d="M4 2.031L23.23 12 4 21.969V2.031zM5 4.604v14.792L18.428 12 5 4.604z"/>
            </svg>
            Baixar no Google Play
        </a>
    </main>

    <footer>
        <p>&copy; 2026 Adonis Leite. Todos os direitos reservados.</p>
        <div class="footer-links">
            <a href="#">Política de Privacidade</a>
            <a href="#">Termos de Uso</a>
            <a href="#">Contato</a>
        </div>
    </footer>

</body>
</html>
